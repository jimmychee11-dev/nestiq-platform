services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nestiq
      POSTGRES_PASSWORD: nestiq
      POSTGRES_DB: nestiq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
